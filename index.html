<!DOCTYPE html>
<html>
<head>
  <title>🔥 Omego </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: #e0f2fe;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
  z-index: 100;
  box-sizing: border-box;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.logo img {
  height: 150px;
  width: auto;
  display: block;
  filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.25));
}

.menu {
  display: flex;
  gap: 30px;
  color: #0369a1;
  font-weight: bold;
  white-space: nowrap;
}

.right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.login-btn {
  background: #38bdf8;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
  cursor: pointer;
}

/* MAIN */
.main {
  position: relative;
  margin-top: 60px;
  width: 100%;
  height: calc(100vh - 60px);
  overflow: hidden;
}

/* COMMON VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #000;
  display: block;
}

/* STRANGER VIDEO */
.video-section {
  position: relative;
  background: #000;
  overflow: hidden;
  border-radius: 20px;
}

/* MY VIDEO */
.my-video-box {
  position: relative;
  background: #000;
  overflow: hidden;
  border-radius: 20px;
}

#myVideo {
  position: absolute;
  width: 160px;
  height: 120px;
  bottom: 90px;
  right: 20px;
  border-radius: 12px;
  border: 2px solid #ffffff;
  background: #000;
  z-index: 20;
}

/* CHAT */
.chat-section {
  display: flex;
  flex-direction: column;
  padding: 12px;
  gap: 10px;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(10px);
  overflow: hidden;
  border-radius: 20px;
  min-width: 0;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding-right: 4px;
  word-break: break-word;
}

#typing {
  min-height: 18px;
  font-size: 12px;
  color: #a1a1aa;
}

#msg {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
  color: #0f172a;
  background: #ffffff;
}

input::placeholder {
  color: #64748b;
}

/* CHAT TEXT */
.you {
  color: #4ade80;
  margin-bottom: 6px;
  font-size: 14px;
}

.stranger {
  color: #f87171;
  margin-bottom: 6px;
  font-size: 14px;
}

/* TOP BAR */
.top-bar {
  position: absolute;
  top: 10px;
  left: 0;
  right: 0;
  text-align: center;
  font-weight: bold;
  z-index: 10;
  pointer-events: none;
}

/* CONTROLS */
.controls {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 999;
}

button {
  width: 50px;
  height: 50px;
  border: none;
  border-radius: 50%;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
}

button i {
  font-size: 18px;
}

.start { background: #22c55e; }
.next { background: #3b82f6; }
.mute { background: #eab308; }
.end { background: #ef4444; }

/* MOBILE TOGGLE */
.top-toggle {
  display: none;
}

.toggle-btn {
  padding: 8px 14px;
  border-radius: 20px;
  background: #1e293b;
  cursor: pointer;
  user-select: none;
}

#online {
  background: #ffffff;
  color: #000;
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 13px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

#online::before {
  content: "● ";
  color: #22c55e;
  font-size: 14px;
}


/* DESKTOP */
@media (min-width: 769px) {
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr 0.6fr;
    gap: 20px;
    padding: 20px;
    background: linear-gradient(135deg, #6d5dfc, #5a4ae3);
  }

  .video-section,
  .my-video-box,
  .chat-section {
    border-radius: 20px;
  }

  #myVideo {
    position: static;
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 0;
  }

  .chat-section {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
  }
}

/* 🔥 PRO MOBILE UI - WHATSAPP STYLE */
@media (max-width: 768px) {

  body {
    overflow: hidden;
    background: #000;
  }

  .main {
    display: block;
    position: relative;
    width: 100%;
    height: 100vh;
  }

  /* 🎥 FULL SCREEN VIDEO */
  .video-section {
    width: 100%;
    height: 100vh;
    background: #000;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .my-video-box {
    position: absolute;
    top: 80px;
    right: 15px;
    width: 110px;
    height: 140px;
    border-radius: 15px;
    overflow: hidden;
    border: 2px solid white;
    background: black;
    z-index: 50;
  }

  #myVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

}
  @media (max-width: 768px) {

  .header {
    background: #e0f2fe;
    height: 60px;
    display: flex;
  }

}

  .top-toggle {
    display: none;
  }

  .controls {
    position: fixed;
    bottom: 25px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 18px;
    z-index: 999;
  }

  button {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: 0.2s;
  }

  button:active {
    transform: scale(0.9);
  }

  .start {
    background: #22c55e;
  }

  .next {
    background: #3b82f6;
  }

  .mute {
    background: #eab308;
  }

  .end {
    background: #ef4444;
    width: 65px;
    height: 65px;
  }

  /* 💬 FLOATING CHAT BUTTON */
  .chat-float {
    position: fixed;
    bottom: 110px;
    right: 20px;
    width: 55px;
    height: 55px;
    background: #22c55e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  /* 💬 CHAT POPUP */
  .chat-section {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 45%;
    background: #0f172a;
    display: none;
    flex-direction: column;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    z-index: 9999;
    animation: slideUp 0.25s ease;
  }

  .chat-section.active {
    display: flex;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  #msg {
    margin: 10px;
    border-radius: 20px;
    padding: 12px;
  }

}

  </style>
</head>

<body>

<div class="main">

 <!-- online user show -->

<div class="header">
  <div class="logo">
  <img src="logo.png" alt="logo">
</div>

  <div class="menu">
    <span>VIDEO CHAT</span>
    <span>MESSAGE</span>
    <span>HISTORY</span>
  </div>

 <div id="online">Online: 0</div>

  <div class="right">
    <button class="login-btn">Login</button>
  </div>
</div>

  <!-- VIDEO -->
<div class="video-section">
  <div id="status" class="top-bar">Connecting...</div>
  <video id="userVideo" autoplay playsinline></video>
</div>

<div class="my-video-box">
  <video id="myVideo" autoplay muted playsinline></video>
</div>

  <div class="chat-section" id="chatBox">
    <div id="chat"></div>
    <div id="typing"></div>
    <input id="msg" placeholder="Type..." onkeydown="if(event.key==='Enter') sendMsg()" />
  </div>

    <!-- MOBILE TOGGLE -->

    <div class="controls">
  <button class="start" id="startBtn" onclick="start()">
    <i class="fas fa-play"></i>
  </button>

  <button class="next" id="nextBtn" onclick="nextUser()" style="display:none;">
    <i class="fas fa-forward"></i>
  </button>

  <button class="mute" onclick="toggleMute()">
    <i class="fas fa-microphone"></i>
  </button>

  <button class="end" onclick="endCall()">
    <i class="fas fa-phone-slash"></i>
  </button>
  <button class="chat-float" onclick="toggleChat()">
    <i class="fas fa-comment"></i>
  </button>
</div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let isConnected = false;

let localStream;
let peerConnection;
let isMuted = false;
let typingTimeout;


function toggleChat(){
  const chat = document.getElementById("chatBox");
  chat.classList.toggle("active");
}

document.addEventListener("click", function(e){
  const chat = document.getElementById("chatBox");
  const btn = document.querySelector(".chat-float");

  if (!chat.contains(e.target) && !btn.contains(e.target)) {
    chat.classList.remove("active");
  }
});

document.getElementById("msg").addEventListener("input", () => {
  socket.emit("typing");
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    socket.emit("stop-typing");
  }, 1000);
});

function showChat(){
  document.getElementById("chatBox").classList.add("active");
}

function showVideo(){
  document.getElementById("chatBox").classList.remove("active");
}

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

async function startVideo() {
  if (localStream) return; // 🔥 already running

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("myVideo").srcObject = localStream;
}

async function start() {
  await startVideo();
  socket.emit("start");
  status("Searching...");
 
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "inline-flex";
}

function nextUser() {
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }

  document.getElementById("userVideo").srcObject = null;
  
  document.getElementById("chat").innerHTML = "";
  document.getElementById("typing").innerText = "";

  socket.emit("next");
  status("Finding new user...");
}

function endCall() {
  location.reload();
}

function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks()[0].enabled = !isMuted;
}

function sendMsg() {
  const msg = document.getElementById("msg").value;

  if (!msg || !isConnected) {
  alert("❌ Wait for stranger...");
  return;
}

  socket.emit("message", msg);
  addMsg("You", msg);
  document.getElementById("msg").value = "";
}

function addMsg(sender, text) {
  const div = document.createElement("div");
  div.className = sender === "You" ? "you" : "stranger";
  div.innerText = sender + ": " + text;
  document.getElementById("chat").appendChild(div);
}

function status(txt){
  const el = document.getElementById("status");
  if (el) el.innerText = txt;
}
// SOCKET SAME

socket.on("online-users", (count) => {
  document.getElementById("online").innerText = "Online: " + count;
});

socket.on("matched", async (data) => {
  isConnected = true;
  status("Connected ✅");
  await startVideo();

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (e) => {
    document.getElementById("userVideo").srcObject = e.streams[0];
  };

  peerConnection.onicecandidate = (e) => {
    if (e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  if (data.role === "caller") {
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit("offer", offer);
  }
});

socket.on("offer", async (offer) => {
  await startVideo();

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (e) => {
    document.getElementById("userVideo").srcObject = e.streams[0];
  };

  peerConnection.onicecandidate = (e) => {
    if (e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  await peerConnection.setRemoteDescription(offer);
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit("answer", answer);
});

socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);
});

socket.on("ice-candidate", (c) => {
  peerConnection.addIceCandidate(new RTCIceCandidate(c));
});

socket.on("message", (msg) => addMsg("Stranger", msg));
socket.on("typing", () => {
  document.getElementById("typing").innerText = "Stranger is typing...";
});

socket.on("stop-typing", () => {
  document.getElementById("typing").innerText = "";
});

socket.on("partner-left", () => {
  isConnected = false;

  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }

  document.getElementById("userVideo").srcObject = null;

  document.getElementById("chat").innerHTML = "";
  document.getElementById("typing").innerText = "";
  document.getElementById("msg").value = "";
  document.getElementById("startBtn").style.display = "inline-flex";
  document.getElementById("nextBtn").style.display = "none";

  status("User left 😢");

  setTimeout(() => {
    socket.emit("next");
    status("🔎 Searching...");
  }, 1000);
});

</script>

</body>
</html>
